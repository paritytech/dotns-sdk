name: Upload to Bulletin
description: Authorize the deployer on Bulletin and upload a build directory

inputs:
  mnemonic:
    description: "BIP39 mnemonic of the deployer account (uploads to Bulletin)"
    required: true
  authorizer-mnemonic:
    description: |
      BIP39 mnemonic (or SURI like //Alice) of the Bulletin Authorizer that
      grants on-chain upload quota to the deployer before upload.
      Defaults to //Alice for local zombienet networks.
    required: false
    default: "//Alice"
  bulletin-rpc:
    description: "Bulletin chain WebSocket RPC endpoint (default: CLI built-in)"
    required: false
  env:
    description: "DotNS environment used by cache/store operations"
    required: false
    default: "paseo-v2"
  build-path:
    description: "Path to the build directory to upload"
    required: false
    default: "./build"
  upload-concurrency:
    description: "Adaptive scheduler max window (max: 4)"
    required: false
    default: "4"
  max-retries:
    description: "Max retry attempts for transient RPC failures"
    required: false
    default: "3"
  retry-delay:
    description: "Seconds to wait between retries"
    required: false
    default: "15"
  cache:
    description: "Write uploaded CID to on-chain Store after upload"
    required: false
    default: "false"
outputs:
  cid:
    description: "Content Identifier of the uploaded build"
    value: ${{ steps.upload.outputs.cid }}
  contenthash:
    description: "Contenthash of the uploaded build"
    value: ${{ steps.upload.outputs.contenthash }}

runs:
  using: composite
  steps:
    - name: Authorize deployer on Bulletin
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../lib/run-dotns.sh"
        echo "::add-mask::$DOTNS_MNEMONIC"
        echo "::add-mask::$AUTHORIZER_MNEMONIC"

        ADDRESS=$(dotns account address)
        RESULT_FILE=$(mktemp)
        # SURI like //Alice goes via --key-uri; everything else is a BIP39 mnemonic.
        if [[ "$AUTHORIZER_MNEMONIC" == //* ]]; then
          AUTH_ARGS=(--key-uri "$AUTHORIZER_MNEMONIC")
        else
          AUTH_ARGS=(-m "$AUTHORIZER_MNEMONIC")
        fi
        ARGS=(bulletin authorize "$ADDRESS" "${AUTH_ARGS[@]}" --json --reporter stream)
        [[ -n "$BULLETIN_RPC" ]] && ARGS+=(--bulletin-rpc "$BULLETIN_RPC")

        if run_dotns_with_retry \
          "Authorize deployer on Bulletin" \
          "$RESULT_FILE" \
          "1" \
          "$RETRY_DELAY" \
          dotns \
          "${ARGS[@]}"; then
          echo "::notice::Deployer ${ADDRESS} authorized on Bulletin"
        else
          ERROR_MESSAGE=$(jq -r '.error // empty' "$RESULT_FILE" 2>/dev/null || true)
          echo "::error::${ERROR_MESSAGE:-Bulletin authorize failed}"
          rm -f "$RESULT_FILE"
          exit 1
        fi
        rm -f "$RESULT_FILE"
      env:
        DOTNS_MNEMONIC: ${{ inputs.mnemonic }}
        AUTHORIZER_MNEMONIC: ${{ inputs.authorizer-mnemonic }}
        DOTNS_ENV: ${{ inputs.env }}
        BULLETIN_RPC: ${{ inputs.bulletin-rpc }}
        CI: "true"
        FORCE_COLOR: "0"
        NODE_NO_WARNINGS: "1"
        # ubuntu-latest runners have ≥16 GiB RAM; default ~2 GiB Node heap
        # leaves no headroom if a transient leak window opens during a WS
        # halt teardown. Raising it is a cheap safety net independent of
        # the in-CLI cancellation fixes.
        NODE_OPTIONS: "--max-old-space-size=4096"
        RETRY_DELAY: ${{ inputs.retry-delay }}

    - name: Upload to Bulletin
      id: upload
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../lib/run-dotns.sh"
        echo "::add-mask::$DOTNS_MNEMONIC"

        RESULT_FILE=$(mktemp)
        ARGS=(bulletin upload "$BUILD_PATH" --resume --print-contenthash --json --reporter stream)
        [[ -n "$BULLETIN_RPC" ]] && ARGS+=(--bulletin-rpc "$BULLETIN_RPC")
        ARGS+=(--concurrency "$UPLOAD_CONCURRENCY")
        [[ "$CACHE" == "true" ]] && ARGS+=(--cache)

        if run_dotns_with_retry \
          "Upload build to Bulletin" \
          "$RESULT_FILE" \
          "$MAX_RETRIES" \
          "$RETRY_DELAY" \
          dotns \
          "${ARGS[@]}"; then
          CID=$(jq -r '.cid // empty' "$RESULT_FILE")
          CONTENTHASH=$(jq -r '.contenthash // empty' "$RESULT_FILE")

          if [[ -z "$CID" ]]; then
            echo "::error::Upload completed without a CID"
            rm -f "$RESULT_FILE"
            exit 1
          fi

          echo "cid=$CID" >> "$GITHUB_OUTPUT"
          echo "contenthash=$CONTENTHASH" >> "$GITHUB_OUTPUT"
          echo "::notice::Uploaded CID: $CID"
          rm -f "$RESULT_FILE"
          exit 0
        fi

        ERROR_MESSAGE=$(jq -r '.error // empty' "$RESULT_FILE" 2>/dev/null || true)
        echo "::error::${ERROR_MESSAGE:-Upload failed after $MAX_RETRIES attempts}"
        rm -f "$RESULT_FILE"
        exit 1
      env:
        DOTNS_MNEMONIC: ${{ inputs.mnemonic }}
        DOTNS_ENV: ${{ inputs.env }}
        BULLETIN_RPC: ${{ inputs.bulletin-rpc }}
        BUILD_PATH: ${{ inputs.build-path }}
        UPLOAD_CONCURRENCY: ${{ inputs.upload-concurrency }}
        MAX_RETRIES: ${{ inputs.max-retries }}
        CI: "true"
        FORCE_COLOR: "0"
        NODE_NO_WARNINGS: "1"
        # See note in the authorize step above.
        NODE_OPTIONS: "--max-old-space-size=4096"
        RETRY_DELAY: ${{ inputs.retry-delay }}
        CACHE: ${{ inputs.cache }}
