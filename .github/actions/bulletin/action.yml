name: Upload to Bulletin
description: Authorize an account and upload a build directory to Bulletin

inputs:
  mnemonic:
    description: 'BIP39 mnemonic for Bulletin uploads'
    required: true
  bulletin-rpc:
    description: 'Bulletin chain WebSocket RPC endpoint (default: CLI built-in)'
    required: false
  build-path:
    description: 'Path to the build directory to upload'
    required: false
    default: './build'
  upload-concurrency:
    description: 'Adaptive scheduler max window (max: 4)'
    required: false
    default: '4'
  max-retries:
    description: 'Max retry attempts for transient RPC failures'
    required: false
    default: '3'
  retry-delay:
    description: 'Seconds to wait between retries'
    required: false
    default: '15'
  cache:
    description: 'Write uploaded CID to on-chain Store after upload'
    required: false
    default: 'false'
  use-car:
    description: 'Merkleize with IPFS CLI and upload as a single CAR file for directories'
    required: false
    default: 'false'

outputs:
  cid:
    description: 'Content Identifier of the uploaded build'
    value: ${{ steps.upload.outputs.cid }}
  contenthash:
    description: 'Contenthash of the uploaded build'
    value: ${{ steps.upload.outputs.contenthash }}

runs:
  using: composite
  steps:
    - name: Authorize account for Bulletin
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../lib/run-dotns.sh"
        echo "::add-mask::$DOTNS_MNEMONIC"

        ADDRESS=$(dotns account address)
        RESULT_FILE=$(mktemp)
        ARGS=(bulletin authorize "$ADDRESS" --json --reporter stream)
        [[ -n "$BULLETIN_RPC" ]] && ARGS+=(--bulletin-rpc "$BULLETIN_RPC")

        if run_dotns_with_retry \
          "Authorize account for Bulletin" \
          "$RESULT_FILE" \
          "1" \
          "$RETRY_DELAY" \
          dotns \
          "${ARGS[@]}"; then
          echo "::notice::Account ${ADDRESS} authorized"
        else
          ERROR_MESSAGE=$(jq -r '.error // empty' "$RESULT_FILE" 2>/dev/null || true)
          echo "::error::${ERROR_MESSAGE:-Authorization failed}"
          rm -f "$RESULT_FILE"
          exit 1
        fi
        rm -f "$RESULT_FILE"
      env:
        DOTNS_MNEMONIC: ${{ inputs.mnemonic }}
        BULLETIN_RPC: ${{ inputs.bulletin-rpc }}
        CI: "true"
        FORCE_COLOR: "0"
        NODE_NO_WARNINGS: "1"
        RETRY_DELAY: ${{ inputs.retry-delay }}

    - name: Upload to Bulletin
      id: upload
      shell: bash
      run: |
        set -euo pipefail
        source "$GITHUB_ACTION_PATH/../lib/run-dotns.sh"
        echo "::add-mask::$DOTNS_MNEMONIC"

        RESULT_FILE=$(mktemp)
        ARGS=(bulletin upload "$BUILD_PATH" --resume --print-contenthash --json --reporter stream)
        if [[ -d "$BUILD_PATH" && "$USE_CAR" == "true" ]]; then
          ARGS+=(--as-car)
        fi
        [[ -n "$BULLETIN_RPC" ]] && ARGS+=(--bulletin-rpc "$BULLETIN_RPC")
        ARGS+=(--concurrency "$UPLOAD_CONCURRENCY")
        [[ "$CACHE" == "true" ]] && ARGS+=(--cache)

        if run_dotns_with_retry \
          "Upload build to Bulletin" \
          "$RESULT_FILE" \
          "$MAX_RETRIES" \
          "$RETRY_DELAY" \
          dotns \
          "${ARGS[@]}"; then
          CID=$(jq -r '.cid // empty' "$RESULT_FILE")
          CONTENTHASH=$(jq -r '.contenthash // empty' "$RESULT_FILE")

          if [[ -z "$CID" ]]; then
            echo "::error::Upload completed without a CID"
            rm -f "$RESULT_FILE"
            exit 1
          fi

          echo "cid=$CID" >> "$GITHUB_OUTPUT"
          echo "contenthash=$CONTENTHASH" >> "$GITHUB_OUTPUT"
          echo "::notice::Uploaded CID: $CID"
          rm -f "$RESULT_FILE"
          exit 0
        fi

        ERROR_MESSAGE=$(jq -r '.error // empty' "$RESULT_FILE" 2>/dev/null || true)
        echo "::error::${ERROR_MESSAGE:-Upload failed after $MAX_RETRIES attempts}"
        rm -f "$RESULT_FILE"
        exit 1
      env:
        DOTNS_MNEMONIC: ${{ inputs.mnemonic }}
        BULLETIN_RPC: ${{ inputs.bulletin-rpc }}
        BUILD_PATH: ${{ inputs.build-path }}
        UPLOAD_CONCURRENCY: ${{ inputs.upload-concurrency }}
        MAX_RETRIES: ${{ inputs.max-retries }}
        CI: "true"
        FORCE_COLOR: "0"
        NODE_NO_WARNINGS: "1"
        RETRY_DELAY: ${{ inputs.retry-delay }}
        CACHE: ${{ inputs.cache }}
        USE_CAR: ${{ inputs.use-car }}
