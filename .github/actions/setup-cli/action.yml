name: Setup CLI
description: Install the DotNS CLI from npm, GitHub release tarball, or from source

inputs:
  source:
    description: "release or source"
    required: false
    default: "release"

runs:
  using: composite
  steps:
    - name: Install CLI from npm
      id: npm-install
      if: inputs.source == 'release'
      continue-on-error: true
      shell: bash
      run: npm install -g @parity/dotns-cli

    - name: Download CLI release tarball (fallback)
      id: download
      if: inputs.source == 'release' && steps.npm-install.outcome != 'success'
      shell: bash
      run: |
        set -euo pipefail
        echo "::warning::npm install failed, falling back to GitHub release tarball"
        RELEASE_DIR="${RUNNER_TEMP}/dotns-cli-release"
        rm -rf "$RELEASE_DIR"
        mkdir -p "$RELEASE_DIR"

        ASSET_URL=$(
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/paritytech/dotns-sdk/releases/latest |
            jq -r '.assets[] | select(.name | test("dotns-cli.*\\.tgz$")) | .url' |
            head -n 1
        )

        if [[ -z "$ASSET_URL" || "$ASSET_URL" == "null" ]]; then
          echo "::error::Could not find a dotns-cli release tarball in the latest GitHub release."
          exit 1
        fi

        TARBALL_PATH="${RELEASE_DIR}/dotns-cli.tgz"
        curl -fsSL \
          -H "Accept: application/octet-stream" \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          "$ASSET_URL" \
          -o "$TARBALL_PATH"

        npm install -g "$TARBALL_PATH"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Setup Bun
      if: inputs.source == 'source'
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      if: inputs.source == 'source'
      shell: bash
      run: |
        set -euo pipefail
        bun install --no-frozen-lockfile
        for pkg in packages/*; do
          [ -f "$pkg/package.json" ] || continue
          grep -q '"file:' "$pkg/package.json" || continue
          grep -oP '"[^"]+": "file:\K[^"]+' "$pkg/package.json" | while read -r dep; do
            name=$(jq -r .name "$pkg/$dep/package.json")
            scope_dir="$pkg/node_modules/$(dirname "$name")"
            mkdir -p "$scope_dir"
            ln -sfn "$(cd "$pkg/$dep" && pwd)" "$pkg/node_modules/$name"
          done
        done

    - name: Build CLI
      if: inputs.source == 'source'
      shell: bash
      working-directory: packages/cli
      run: bun run build

    - name: Pack source build
      if: inputs.source == 'source'
      id: pack
      shell: bash
      working-directory: packages/cli
      env:
        NODE_NO_WARNINGS: "1"
      run: |
        TARBALL=$(npm pack | tail -n 1)
        echo "tarball=${PWD}/${TARBALL}" >> "$GITHUB_OUTPUT"

    - name: Install built CLI
      if: inputs.source == 'source'
      shell: bash
      run: npm install -g "${{ steps.pack.outputs.tarball }}"

    - name: Verify
      shell: bash
      run: dotns --help > /dev/null
