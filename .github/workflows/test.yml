name: Test

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/cli/**"
      - ".github/workflows/test.yml"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.result.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.6"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          for pkg in packages/*; do
            [ -f "$pkg/package.json" ] || continue
            grep -q '"file:' "$pkg/package.json" || continue
            grep -oP '"[^"]+": "file:\K[^"]+' "$pkg/package.json" | while read -r dep; do
              name=$(jq -r .name "$pkg/$dep/package.json")
              scope_dir="$pkg/node_modules/$(dirname "$name")"
              mkdir -p "$scope_dir"
              ln -sfn "$(cd "$pkg/$dep" && pwd)" "$pkg/node_modules/$name"
            done
          done

      - name: Run unit tests
        id: test
        continue-on-error: true
        working-directory: packages/cli
        shell: bash
        run: |
          set -o pipefail
          bun run test:unit 2>&1 | tee "$GITHUB_WORKSPACE/test-output.txt"

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          retention-days: 7

      - name: Process results
        id: result
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "status=Passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=Failed" >> "$GITHUB_OUTPUT"
          fi

  report:
    name: Report Test Results
    if: always()
    needs: test
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Download test output
        uses: actions/download-artifact@v4
        with:
          name: test-output
          path: artifacts

      - name: Update test summary
        uses: actions/github-script@v7
        env:
          STATUS: ${{ needs.test.outputs.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const marker = "<!-- ci-summary -->";
            const detailsMarker = "<!-- details-section -->";
            const section = "Test";
            const status = process.env.STATUS === "Passed" ? "Passed" : "Failed";
            const runUrl = process.env.RUN_URL;
            const currentRunId = Number(process.env.CURRENT_RUN_ID);
            const headSha = context.payload.pull_request?.head?.sha ?? process.env.GITHUB_SHA;
            const summaryOrder = [
              "Lint",
              "Lint (UI)",
              "Format",
              "Format (UI)",
              "Typecheck",
              "Typecheck (UI)",
              "Build",
              "Build (UI)",
              "Release",
              "Deploy UI",
              "Deploy Example",
              "Benchmark UI",
              "PR Title",
              "Labels",
              "Test",
            ];
            const watchedWorkflowNames = new Set([
              "Lint",
              "Lint (UI)",
              "Format",
              "Format (UI)",
              "Typecheck",
              "Typecheck (UI)",
              "Build",
              "Build (UI)",
              "Release",
              "Deploy UI",
              "Deploy Example",
              "Benchmark UI Build",
              "PR",
            ]);
            const maxOutputChars = 60000;
            const maxFailuresToShow = 20;
            const waitAttempts = 40;
            const waitDelayMs = 15000;
            const verifyAttempts = 4;
            const verifyDelayMs = 3000;

            const { owner, repo } = context.repo;
            const issueNumber = context.payload.pull_request?.number;

            const outputPath = path.join(process.env.GITHUB_WORKSPACE, "artifacts", "test-output.txt");
            let output = "(test-output.txt not found)";
            try {
              output = fs.readFileSync(outputPath, "utf8");
            } catch (_) {
              // artifact not available
            }

            const truncateOutput = (text) =>
              text.length > maxOutputChars
                ? ["(truncated; showing last " + maxOutputChars + " chars)", "", text.slice(-maxOutputChars)].join("\n")
                : text;

            const parseCount = (regex, fallback = 0) => {
              const match = output.match(regex);
              return match ? Number.parseInt(match[1], 10) : fallback;
            };

            const failureNames = [
              ...new Set(
                [...output.matchAll(/^\(fail\)\s+(.+?)(?:\s+\[[^\]]+\])?$/gm)]
                  .map((match) => match[1]?.trim())
                  .filter(Boolean),
              ),
            ];
            const passCount = parseCount(/^\s*(\d+)\s+pass$/m);
            const parsedFailCount = parseCount(/^\s*(\d+)\s+fail$/m, failureNames.length);
            const failCount =
              status === "Failed" && parsedFailCount === 0
                ? Math.max(1, failureNames.length)
                : parsedFailCount;
            const totalTests = parseCount(
              /Ran\s+(\d+)\s+tests\s+across\s+\d+\s+files\./m,
              passCount + failCount,
            );
            const details =
              status === "Passed"
                ? `${passCount} passed, ${failCount} failed`
                : `${failCount} failure${failCount === 1 ? "" : "s"}`;
            const visibleFailureNames = failureNames.slice(0, maxFailuresToShow);
            const truncatedOutput = truncateOutput(output);

            await core.summary
              .addHeading("Test", 2)
              .addRaw(`Status: **${status}**\n\n`)
              .addRaw(`- ${passCount} passed\n`)
              .addRaw(`- ${failCount} failed\n`)
              .addRaw(totalTests > 0 ? `- ${totalTests} total tests\n` : "")
              .addRaw(`\n[View run](${runUrl})\n`)
              .addRaw(
                status === "Failed" && visibleFailureNames.length > 0
                  ? `\nFailed tests:\n${visibleFailureNames.map((name) => `- ${name}`).join("\n")}\n`
                  : "",
              )
              .write();

            if (context.eventName !== "pull_request" || !issueNumber) {
              return;
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const waitForSummaryWriters = async () => {
              for (let attempt = 0; attempt < waitAttempts; attempt++) {
                const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                  owner,
                  repo,
                  event: "pull_request",
                  head_sha: headSha,
                  per_page: 100,
                });

                const activeRuns = runs.filter(
                  (run) =>
                    watchedWorkflowNames.has(run.name ?? "") &&
                    run.id !== currentRunId &&
                    run.status !== "completed",
                );

                if (activeRuns.length === 0) {
                  return false;
                }

                core.info(
                  `Waiting for CI summary workflows: ${activeRuns
                    .map((run) => `${run.name} (${run.status})`)
                    .join(", ")}`,
                );
                await sleep(waitDelayMs);
              }
              return true;
            };

            const loadExistingComment = async () => {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              return (
                comments.find(
                  (comment) =>
                    comment.user?.login === "github-actions[bot]" &&
                    comment.body?.includes(marker),
                ) ?? null
              );
            };

            const buildDetailsBlock = (timedOut) => {
              const lines = [
                `<details>`,
                `<summary><strong>${section}</strong> - ${status}</summary>`,
                "",
                `${passCount} passed, ${failCount} failed${totalTests > 0 ? ` across ${totalTests} tests` : ""}.`,
                "",
              ];

              if (status === "Failed") {
                if (visibleFailureNames.length > 0) {
                  lines.push("Failed tests:");
                  for (const name of visibleFailureNames) {
                    lines.push(`- ${name}`);
                  }
                  if (failureNames.length > visibleFailureNames.length) {
                    lines.push(`- ...and ${failureNames.length - visibleFailureNames.length} more`);
                  }
                } else {
                  lines.push("Failed tests: unable to parse individual test names from Bun output.");
                }
                lines.push("");
              }

              if (timedOut) {
                lines.push(
                  "_Waited for other CI summary workflows and hit the timeout; wrote the latest available summary._",
                );
                lines.push("");
              }

              lines.push(`[View run](${runUrl})`);
              lines.push("");
              lines.push("```text");
              lines.push(truncatedOutput);
              lines.push("```");
              lines.push("</details>");

              return lines.join("\n");
            };

            const parseExistingBody = (body) => {
              const rows = {};
              const existingDetails = {};

              if (!body) {
                return { rows, existingDetails };
              }

              const tableSection = body.split(detailsMarker)[0] || "";
              for (const line of tableSection.split("\n")) {
                const match = line.match(/^\| ([^|]+) \| ([^|]+) \|$/);
                if (!match) continue;
                const name = match[1].trim();
                if (name && name !== "Check" && !name.startsWith(":")) {
                  rows[name] = match[2].trim();
                }
              }

              const detailsRegex =
                /<details>\s*<summary><strong>([^<]+)<\/strong>.*?<\/summary>([\s\S]*?)<\/details>/g;
              let detailMatch;
              while ((detailMatch = detailsRegex.exec(body)) !== null) {
                existingDetails[detailMatch[1].trim()] = detailMatch[0];
              }

              return { rows, existingDetails };
            };

            const buildCommentBody = (existingBody, timedOut) => {
              const { rows, existingDetails } = parseExistingBody(existingBody);
              rows[section] = `[${status}](${runUrl}) - ${details}`;
              existingDetails[section] = buildDetailsBlock(timedOut);

              const sortedKeys = Object.keys(rows).sort((a, b) => {
                const ai = summaryOrder.indexOf(a);
                const bi = summaryOrder.indexOf(b);
                return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
              });

              let table = `| Check | Result |\n|:------|:-------|\n`;
              for (const key of sortedKeys) {
                table += `| ${key} | ${rows[key]} |\n`;
              }

              const sortedDetails = Object.keys(existingDetails).sort((a, b) => {
                const ai = summaryOrder.indexOf(a);
                const bi = summaryOrder.indexOf(b);
                return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
              });

              let body = `${marker}\n## CI Summary\n\n${table}`;
              if (sortedDetails.length > 0) {
                body += `\n${detailsMarker}\n\n---\n\n${sortedDetails
                  .map((key) => existingDetails[key])
                  .join("\n\n")}`;
              }

              return body;
            };

            const hasTestEntry = (body) =>
              body.includes(`| ${section} |`) &&
              body.includes(`<summary><strong>${section}</strong> - ${status}</summary>`);

            const timedOut = await waitForSummaryWriters();

            for (let attempt = 1; attempt <= verifyAttempts; attempt++) {
              const existing = await loadExistingComment();
              const body = buildCommentBody(existing?.body ?? "", timedOut);

              let commentId = existing?.id;
              if (commentId) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: commentId, body });
              } else {
                const created = await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body,
                });
                commentId = created.data.id;
              }

              await sleep(verifyDelayMs);
              const refreshed = await github.rest.issues.getComment({
                owner,
                repo,
                comment_id: commentId,
              });

              if (hasTestEntry(refreshed.data.body ?? "")) {
                return;
              }

              core.warning(
                `Test summary verification failed on attempt ${attempt}/${verifyAttempts}; retrying.`,
              );
            }

            core.warning("Unable to verify that the shared CI summary retained the Test section.");

  fail:
    name: Fail if tests failed
    if: always() && needs.test.outputs.status == 'Failed'
    needs:
      - test
      - report
    runs-on: ubuntu-latest
    steps:
      - name: Fail workflow for test failures
        run: exit 1
