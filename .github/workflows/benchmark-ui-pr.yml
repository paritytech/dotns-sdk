name: Benchmark UI Build

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - "packages/ui/**"
      - "package.json"
      - "bun.lockb"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: benchmark-ui-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.6"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI
        run: bun run build
        working-directory: packages/ui

      - name: Upload UI build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-ui-build-${{ github.event.pull_request.number }}
          path: packages/ui/dist
          retention-days: 2

  deploy:
    needs: benchmark
    uses: ./.github/workflows/deploy.yml
    with:
      basename: bulletin-benchmarks
      artifact-name: pr-ui-build-${{ github.event.pull_request.number }}
      mode: preview
      subname: pr${{ github.event.pull_request.number }}-ui
      register-base: true
      env: paseo-v2
      cli-source: release
      sdk-ref: ${{ github.head_ref || github.ref }}
      skip-cache: true
      max-retries: 5
      use-car: true
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
      bulletin-mnemonic: ${{ secrets.DOTNS_MNEMONIC_BENCHMARK }}

  report:
    needs: [benchmark, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update CI Summary comment
        uses: actions/github-script@v7
        env:
          SECTION: Benchmark UI
          STATUS: ${{ needs.deploy.result == 'success' && 'Passed' || 'Failed' }}
          DURATION: ${{ needs.deploy.outputs.duration-seconds || '0' }}
          CID: ${{ needs.deploy.outputs.cid || 'n/a' }}
          FQDN: ${{ needs.deploy.outputs.fqdn || 'n/a' }}
          PREVIEW_URL: ${{ needs.deploy.outputs.url || '' }}
          PREVIEW_URL_DIRECT: ${{ needs.deploy.outputs.url-direct || '' }}
          PREVIEW_URL_DOTLI_PATH: ${{ needs.deploy.outputs.url-dotli-path || '' }}
          PREVIEW_URL_DOTLI_HOST: ${{ needs.deploy.outputs.url-dotli-host || '' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = "<!-- ci-summary -->";
            const detailsMarker = "<!-- details-section -->";
            const section = process.env.SECTION;
            const status = process.env.STATUS;
            const duration = process.env.DURATION;
            const cid = process.env.CID;
            const fqdn = process.env.FQDN;
            const previewUrl = process.env.PREVIEW_URL;
            const previewUrlDirect = process.env.PREVIEW_URL_DIRECT;
            const previewUrlDotliPath = process.env.PREVIEW_URL_DOTLI_PATH;
            const previewUrlDotliHost = process.env.PREVIEW_URL_DOTLI_HOST;
            const runUrl = process.env.RUN_URL;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });

            const existing = comments.find(c =>
              c.user?.login === "github-actions[bot]" && c.body?.includes(marker)
            );

            let rows = {};
            let existingDetails = {};

            if (existing?.body) {
              const parts = existing.body.split(detailsMarker);
              const tableSection = parts[0] || "";
              const lines = tableSection.split("\n");
              for (const line of lines) {
                const match = line.match(/^\| ([^|]+) \| ([^|]+) \|$/);
                if (match) {
                  const name = match[1].trim();
                  if (name && name !== "Check" && !name.startsWith(":")) {
                    rows[name] = match[2].trim();
                  }
                }
              }

              const detailsRegex = /<details>\s*<summary><strong>([^<]+)<\/strong>.*?<\/summary>([\s\S]*?)<\/details>/g;
              let detailMatch;
              while ((detailMatch = detailsRegex.exec(existing.body)) !== null) {
                existingDetails[detailMatch[1].trim()] = detailMatch[0];
              }
            }

            rows[section] = status === "Passed" ? `Passed` : `[Failed](${runUrl})`;

            const previewRows = [];
            if (previewUrlDotliHost) {
              previewRows.push(`| Preview | [open](${previewUrlDotliHost}) |`);
            } else {
              if (previewUrlDotliPath) {
                previewRows.push(`| Preview (dot.li) | [open](${previewUrlDotliPath}) |`);
              }
              if (previewUrlDirect) {
                previewRows.push(`| Preview (direct) | [open](${previewUrlDirect}) |`);
              }
            }
            if (previewRows.length === 0 && previewUrl) {
              previewRows.push(`| Preview | [open](${previewUrl}) |`);
            }

            const benchmarkTable = [
              `| Property | Value |`,
              `|----------|-------|`,
              `| Duration | ${duration}s |`,
              `| Domain | \`${fqdn}\` |`,
              `| CID | \`${cid}\` |`,
              ...previewRows,
              `| Workflow | [view](${runUrl}) |`,
            ].filter(Boolean).join("\n");

            existingDetails[section] = `<details>\n<summary><strong>${section}</strong> - ${status} (${duration}s)</summary>\n\n${benchmarkTable}\n\n</details>`;

            const order = ["Lint", "Lint (UI)", "Format", "Format (UI)", "Typecheck", "Typecheck (UI)", "Build", "Build (UI)", "Release", "Deploy UI", "Deploy Example", "Benchmark UI", "PR Title", "Labels", "Test"];
            const sortedKeys = Object.keys(rows).sort((a, b) => {
              const ai = order.indexOf(a), bi = order.indexOf(b);
              return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
            });

            let table = `| Check | Result |\n|:------|:-------|\n`;
            for (const key of sortedKeys) {
              table += `| ${key} | ${rows[key]} |\n`;
            }

            const sortedDetails = Object.keys(existingDetails).sort((a, b) => {
              const ai = order.indexOf(a), bi = order.indexOf(b);
              return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
            });

            let body = `${marker}\n## CI Summary\n\n${table}`;
            if (sortedDetails.length > 0) {
              body += `\n${detailsMarker}\n\n---\n\n${sortedDetails.map(k => existingDetails[k]).join("\n\n")}`;
            }

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
