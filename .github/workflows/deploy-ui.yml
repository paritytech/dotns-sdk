name: Deploy UI

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/ui/**"
      - ".github/workflows/deploy-ui.yml"
      - ".github/workflows/deploy.yml"
      - ".github/actions/**"
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-ui-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build UI
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.result.outputs.status }}
      details: ${{ steps.result.outputs.details }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.6"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          bun install --no-frozen-lockfile
          for pkg in packages/*; do
            [ -f "$pkg/package.json" ] || continue
            grep -q '"file:' "$pkg/package.json" || continue
            grep -oP '"[^"]+": "file:\K[^"]+' "$pkg/package.json" | while read -r dep; do
              name=$(jq -r .name "$pkg/$dep/package.json")
              scope_dir="$pkg/node_modules/$(dirname "$name")"
              mkdir -p "$scope_dir"
              ln -sfn "$(cd "$pkg/$dep" && pwd)" "$pkg/node_modules/$name"
            done
          done

      - name: Run build
        id: build
        continue-on-error: true
        working-directory: packages/ui
        shell: bash
        run: |
          set -o pipefail
          bun run build 2>&1 | tee "$GITHUB_WORKSPACE/deploy-ui-build-output.txt"

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-ui-build-output
          path: deploy-ui-build-output.txt
          retention-days: 7

      - name: Upload site artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ui-site
          path: packages/ui/dist/
          retention-days: 7

      - name: Process results
        id: result
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "status=Passed" >> "$GITHUB_OUTPUT"
            echo "details=Build succeeded" >> "$GITHUB_OUTPUT"
          else
            echo "status=Failed" >> "$GITHUB_OUTPUT"
            echo "details=Build failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    needs: [build]
    uses: ./.github/workflows/deploy.yml
    with:
      basename: dotns
      mode: preview
      subname-format: pr-number
      artifact-name: ui-site
      register-base: false
      cli-source: source
      sdk-ref: ${{ github.head_ref || github.ref }}
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
      bulletin-mnemonic: ${{ secrets.DOTNS_MNEMONIC_DEPLOY_UI }}

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push' && !contains(github.ref_name, '-')
    needs: [build]
    uses: ./.github/workflows/deploy.yml
    with:
      basename: dotns
      mode: production
      artifact-name: ui-site
      register-base: false
      cli-source: source
      sdk-ref: ${{ github.head_ref || github.ref }}
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
      bulletin-mnemonic: ${{ secrets.DOTNS_MNEMONIC_DEPLOY_UI }}

  comment:
    name: Update PR Comment
    if: always() && github.event_name == 'pull_request'
    needs: [build, deploy-preview]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: deploy-ui-build-output
          path: artifacts
        continue-on-error: true

      - name: Update PR comment
        uses: actions/github-script@v7
        env:
          SECTION: Deploy UI
          BUILD_STATUS: ${{ needs.build.outputs.status }}
          BUILD_DETAILS: ${{ needs.build.outputs.details }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy-preview.result }}
          DEPLOY_CID: ${{ needs.deploy-preview.outputs.cid }}
          DEPLOY_FQDN: ${{ needs.deploy-preview.outputs.fqdn }}
          DEPLOY_URL: ${{ needs.deploy-preview.outputs.url }}
          DEPLOY_CACHE_HIT: ${{ needs.deploy-preview.outputs.cache-hit }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");

            const MAX_OUTPUT_CHARS = 60000;

            function readArtifact(filename) {
              try {
                return fs.readFileSync(`artifacts/${filename}`, "utf8");
              } catch (_) {
                return "";
              }
            }

            function truncate(text) {
              if (!text) return "(no output captured)";
              if (text.length > MAX_OUTPUT_CHARS) {
                return "(truncated; showing last " + MAX_OUTPUT_CHARS + " chars)\n\n" + text.slice(-MAX_OUTPUT_CHARS);
              }
              return text;
            }

            const marker = "<!-- ci-summary -->";
            const detailsMarker = "<!-- details-section -->";
            const section = process.env.SECTION;
            const runUrl = process.env.RUN_URL;

            const buildStatus = process.env.BUILD_STATUS;
            const buildDetails = process.env.BUILD_DETAILS;
            const buildResult = process.env.BUILD_RESULT;

            const deployResult = process.env.DEPLOY_RESULT;
            const cid = process.env.DEPLOY_CID;
            const fqdn = process.env.DEPLOY_FQDN;
            const url = process.env.DEPLOY_URL;
            const cacheHit = process.env.DEPLOY_CACHE_HIT === "true";

            const buildPassed = buildStatus === "Passed";
            const deployPassed = deployResult === "success";
            const allPassed = buildPassed && deployPassed;

            const stages = [];

            stages.push({
              name: "Build",
              passed: buildPassed,
              detail: buildPassed
                ? "Build succeeded"
                : (buildDetails || "Build failed"),
            });

            if (deployResult === "skipped") {
              stages.push({
                name: "Deploy",
                passed: false,
                detail: "Skipped (prerequisite job failed)",
              });
            } else {
              stages.push({
                name: "Deploy",
                passed: deployPassed,
                detail: deployPassed
                  ? (cacheHit ? "Deployed (cached)" : "Deployed")
                  : "Deploy workflow failed — see run logs for upload/register/contenthash details",
              });
            }

            let failOutput = "";
            const failedStage = stages.find(s => !s.passed);

            if (failedStage) {
              if (failedStage.name === "Build") {
                failOutput = readArtifact("deploy-ui-build-output.txt");
              }
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });

            const existing = comments.find(c =>
              c.user?.login === "github-actions[bot]" && c.body?.includes(marker)
            );

            let rows = {};
            let existingDetails = {};

            if (existing?.body) {
              const parts = existing.body.split(detailsMarker);
              const tableSection = parts[0] || "";

              const lines = tableSection.split("\n");
              for (const line of lines) {
                const match = line.match(/^\| ([^|]+) \| ([^|]+) \|$/);
                if (match) {
                  const name = match[1].trim();
                  if (name && name !== "Check" && !name.startsWith(":")) {
                    rows[name] = match[2].trim();
                  }
                }
              }

              const detailsRegex = /<details>\s*<summary><strong>([^<]+)<\/strong>.*?<\/summary>([\s\S]*?)<\/details>/g;
              let detailMatch;
              while ((detailMatch = detailsRegex.exec(existing.body)) !== null) {
                existingDetails[detailMatch[1].trim()] = detailMatch[0];
              }
            }

            const resultText = allPassed ? "Passed" : "Failed";
            rows[section] = `[${resultText}](${runUrl})`;

            const stageRows = stages
              .map(s => `| ${s.passed ? "✓" : "✗"} ${s.name} | ${s.detail} |`)
              .join("\n");

            const stageTable = [
              "| Stage | Status |",
              "|:------|:-------|",
              stageRows,
            ].join("\n");

            if (allPassed && cid && fqdn) {
              const cidDisplay = cacheHit ? `\`${cid}\` (cached)` : `\`${cid}\``;

              existingDetails[section] = [
                `<details>`,
                `<summary><strong>${section}</strong> — ${resultText}</summary>`,
                "",
                stageTable,
                "",
                `| Property | Value |`,
                `|----------|-------|`,
                `| Domain | \`${fqdn}\` |`,
                `| CID | ${cidDisplay} |`,
                `| URL | [${url}](${url}) |`,
                "",
                `[View run](${runUrl})`,
                "",
                "</details>",
              ].join("\n");
            } else {
              const headline = failedStage
                ? `**Failed at: ${failedStage.name}** — ${failedStage.detail}`
                : "Unknown failure";

              const outputBlock = failOutput
                ? ["", "```text", truncate(failOutput), "```"].join("\n")
                : "";

              existingDetails[section] = [
                `<details>`,
                `<summary><strong>${section}</strong> — ${resultText}</summary>`,
                "",
                headline,
                "",
                stageTable,
                "",
                `[View run](${runUrl})`,
                outputBlock,
                "",
                "</details>",
              ].join("\n");
            }

            const order = ["Lint", "Lint (UI)", "Format", "Format (UI)", "Typecheck", "Typecheck (UI)", "Build", "Build (UI)", "Test", "Release", "Deploy UI", "Deploy Example", "PR Title", "Labels"];
            const sortedKeys = Object.keys(rows).sort((a, b) => {
              const ai = order.indexOf(a), bi = order.indexOf(b);
              return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
            });

            let table = `| Check | Result |\n|:------|:-------|\n`;
            for (const key of sortedKeys) {
              table += `| ${key} | ${rows[key]} |\n`;
            }

            const sortedDetails = Object.keys(existingDetails).sort((a, b) => {
              const ai = order.indexOf(a), bi = order.indexOf(b);
              return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
            });

            let body = `${marker}\n## CI Summary\n\n${table}`;
            if (sortedDetails.length > 0) {
              body += `\n${detailsMarker}\n\n---\n\n${sortedDetails.map(k => existingDetails[k]).join("\n\n")}`;
            }

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
