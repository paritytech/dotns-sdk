name: NPM Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.2)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # When dispatched automatically from release.yml, the release assets
      # may not be available yet (GitHub processes uploads asynchronously).
      # Retry up to 5 times with 15s delay to handle this race condition.
      - name: Download CLI tarball from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p packs
          for i in 1 2 3 4 5; do
            gh release download "${{ inputs.tag }}" \
              --pattern "*.tgz" \
              --dir packs \
              --repo "${{ github.repository }}" && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          ls -ltr packs

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ github.run_id }}
          path: packs

      - name: Trigger npm_publish_automation
        uses: octokit/request-action@v2.x
        with:
          route: POST /repos/paritytech/npm_publish_automation/actions/workflows/publish.yml/dispatches
          ref: main
          inputs: '${{ format(''{{ "repo": "{0}", "run_id": "{1}" }}'', github.repository, github.run_id) }}'
        env:
          GITHUB_TOKEN: ${{ secrets.NPM_PUBLISH_AUTOMATION_TOKEN }}
