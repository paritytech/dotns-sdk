"scope: store":
  - changed-files:
      - any-glob-to-any-file: "src/store/**"

"scope: component":
  - changed-files:
      - any-glob-to-any-file: "src/components/**"

"scope: view":
  - changed-files:
      - any-glob-to-any-file: "src/views/**"

"scope: router":
  - changed-files:
      - any-glob-to-any-file: "src/router/**"

"scope: service":
  - changed-files:
      - any-glob-to-any-file: "src/services/**"

"type: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

"type: test":
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"
          - "**/*.test.ts"
          - "**/*.spec.ts"

"dependencies":
  - changed-files:
      - any-glob-to-any-file:
          - "**/package.json"
          - "**/bun.lock"
