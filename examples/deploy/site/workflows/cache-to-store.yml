# Upload to Bulletin and write the CID to the on-chain Store.
#
# --cache writes the uploaded CID to the user's Store contract on Asset Hub
# (Paseo), not on Bulletin. The wallet behind DOTNS_MNEMONIC must hold enough
# PAS on Asset Hub to cover the Store write transaction. If the Store does not
# exist yet, --cache will attempt to deploy one, which requires additional
# balance. When the balance is insufficient the upload still succeeds; only the
# Store write is skipped with a warning.
name: Deploy (Cache to Store)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist/

  deploy-preview:
    name: Deploy Preview
    needs: build
    if: github.event_name == 'pull_request'
    uses: paritytech/dotns-sdk/.github/workflows/deploy.yml@main
    with:
      basename: my-app
      artifact-name: site
      mode: preview
      register-base: true
      cache: true # write CID to on-chain Store on Asset Hub
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  deploy-production:
    name: Deploy Production
    needs: build
    if: github.event_name == 'push'
    uses: paritytech/dotns-sdk/.github/workflows/deploy.yml@main
    with:
      basename: my-app
      artifact-name: site
      mode: production
      cache: true # write CID to on-chain Store on Asset Hub
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
