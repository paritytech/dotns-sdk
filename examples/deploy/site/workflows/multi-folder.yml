# Deploy multiple folders to separate subdomains in parallel.
#
# Bulletin uploads use the account's nonce for transaction ordering. When
# multiple uploads run simultaneously with the same account, nonce collisions
# cause failures. Use a separate mnemonic per upload to avoid this.
#
# These mnemonics are only used for Bulletin storage uploads, not for
# on-chain contract interactions (registration, contenthash). The dotns
# operations (register, content set) use the dotns-mnemonic secret which
# can be shared since they run sequentially after each upload.
#
# Create one secret per folder: Settings > Secrets and variables > Actions.
#
# Use case: Monorepo with multiple deployable apps (docs, dashboard, api-docs).
name: Deploy Multiple Folders

on:
  push:
    branches: [main]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build:docs
      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: packages/docs/dist/

  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build:dashboard
      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-site
          path: packages/dashboard/dist/

  deploy-docs:
    needs: build-docs
    uses: paritytech/dotns-sdk/.github/workflows/deploy.yml@main
    with:
      basename: my-project
      subname: docs
      artifact-name: docs-site
      mode: preview
      register-base: true
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
      bulletin-mnemonic: ${{ secrets.DEPLOY_DOCS_MNEMONIC }}

  deploy-dashboard:
    needs: build-dashboard
    uses: paritytech/dotns-sdk/.github/workflows/deploy.yml@main
    with:
      basename: my-project
      subname: dashboard
      artifact-name: dashboard-site
      mode: preview
      register-base: true
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
      bulletin-mnemonic: ${{ secrets.DEPLOY_DASHBOARD_MNEMONIC }}
