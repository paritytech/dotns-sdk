# Deploy using a CAR file instead of individual IPFS blocks.
#
# When use-car is enabled, the workflow installs IPFS Kubo, merkleizes the
# build directory into a CAR file (ipfs add + ipfs dag export), and uploads
# the CAR as a single chunked file to Bulletin. This matches the storage
# strategy used by deploy-to-triangle and the deploy.js example.
#
# The default (use-car: false) merkleizes in-memory and uploads each IPFS
# block individually. CAR-based upload can be faster for large sites because
# it writes fewer, larger transactions.
#
# Use case: Large static sites or projects that need CAR-based storage
# for compatibility with the Polkadot Triangle gateway.
name: Deploy (CAR)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist/

  deploy-preview:
    name: Deploy Preview
    needs: build
    if: github.event_name == 'pull_request'
    uses: paritytech/dotns-sdk/.github/workflows/deploy.yml@main
    with:
      basename: my-app
      artifact-name: site
      mode: preview
      use-car: true
      register-base: true
      max-retries: 5
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  deploy-production:
    name: Deploy Production
    needs: build
    if: github.event_name == 'push'
    uses: paritytech/dotns-sdk/.github/workflows/deploy.yml@main
    with:
      basename: my-app
      artifact-name: site
      mode: production
      use-car: true
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
