# Deploy using in-memory CAR merkleization (--as-car).
#
# The CLI merkleizes the build directory into a CAR file in-memory using
# ipfs-unixfs-importer and @ipld/car, then uploads it as a single chunked
# file to Bulletin. No external IPFS binary is needed.
#
# CAR-based upload can be faster for large sites because it writes fewer,
# larger transactions.
#
# Use case: Large static sites or projects that need CAR-based storage
# for compatibility with the Polkadot Triangle gateway.
name: Deploy (CAR)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist/

  deploy-preview:
    name: Deploy Preview
    needs: build
    if: github.event_name == 'pull_request'
    uses: paritytech/dotns-sdk/.github/workflows/deploy.yml@main
    with:
      basename: my-app
      artifact-name: site
      mode: preview
      register-base: true
      max-retries: 5
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  deploy-production:
    name: Deploy Production
    needs: build
    if: github.event_name == 'push'
    uses: paritytech/dotns-sdk/.github/workflows/deploy.yml@main
    with:
      basename: my-app
      artifact-name: site
      mode: production
    secrets:
      dotns-mnemonic: ${{ secrets.DOTNS_MNEMONIC }}
